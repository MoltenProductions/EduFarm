<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moltens Lab - Games</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Simple style for error messages */
    .game-error { color: red; font-size: 0.9em; margin-top: 5px; }
  </style>
</head>
<body>
  <header>
    <h1>Moltens Lab</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="sites.html" target="_blank">Sites</a>
    </nav>
  </header>

  <main class="games-page">
    <input type="text" id="search" placeholder="Search games..." oninput="filterGames()">
    <div id="game-list"></div>

    <div id="game-play-wrapper">
      <div class="ad-panel" id="ad-left"><div class="ad-box">Left Panel</div></div>
      <div id="game-container">
        <iframe id="game-frame" src=""></iframe>
        <div id="game-controls">
          <button id="close-game" onclick="closeGame()">Close Game</button>
          <label>Volume: <input type="range" id="volume" min="0" max="100" value="100"></label>
        </div>
      </div>
      <div class="ad-panel" id="ad-right"><div class="ad-box">Right Panel</div></div>
    </div>
  </main>

  <footer>
    <p>© 2026 Moltens Lab | Made By: Mason A | <a href="https://discord.gg/dVxpKG6xz2" target="_blank">Join Discord</a></p>
  </footer>

  <script>
    const gamesContainer = document.getElementById('game-list');
    const gameFrame = document.getElementById('game-frame');

    async function loadGames() {
      try {
        const res = await fetch('./games-list.json');
        const games = await res.json();

        games.forEach(game => {
          // Replace spaces with hyphens for URL paths
          const folderSafe = game.folder.replace(/ /g, '-');

          const thumb = game.thumb || 'default-thumbnail.png';
          const div = document.createElement('div');
          div.className = 'game-card';
          div.dataset.name = folderSafe.toLowerCase();
          div.style.backgroundImage = `url('${thumb}')`;
          div.innerHTML = `<h3>${game.folder.replace(/-/g,' ')}</h3>`;

          // Click event
          div.addEventListener('click', () => {
            const gameURL = `games/${folderSafe}/index.html`;
            fetch(gameURL, { method: 'HEAD' })
              .then(res => {
                if(res.ok) {
                  gameFrame.src = gameURL;
                  window.scrollTo({top: gameFrame.offsetTop - 20, behavior: 'smooth'});
                } else {
                  alert(`Game not found: ${folderSafe}`);
                }
              }).catch(() => alert(`Game not found: ${folderSafe}`));
          });

          // Check thumbnail exists
          fetch(thumb, { method: 'HEAD' })
            .catch(() => {
              const errMsg = document.createElement('div');
              errMsg.className = 'game-error';
              errMsg.innerText = "Thumbnail missing!";
              div.appendChild(errMsg);
            });

          gamesContainer.appendChild(div);
        });

      } catch (err) {
        console.error("Failed to load games-list.json:", err);
        gamesContainer.innerHTML = "<p class='game-error'>Failed to load games list.</p>";
      }
    }

    loadGames();

    function filterGames() {
      const input = document.getElementById('search').value.toLowerCase();
      document.querySelectorAll('.game-card').forEach(card => {
        card.style.display = card.dataset.name.includes(input) ? 'flex' : 'none';
      });
    }

    function closeGame() {
      gameFrame.src = '';
      window.scrollTo({top: 0, behavior: 'smooth'});
    }
  </script>
</body>
</html>
