<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moltens Lab - Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Moltens Lab</h1>
    <nav>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main>
    <h2>Available Games</h2>
    <input type="text" id="search" placeholder="Search games..." oninput="filterGames()">
    <div id="game-list"></div>
  </main>

  <footer>
    <p>© 2026 Moltens Lab</p>
  </footer>

  <script>
    async function loadGames() {
      const container = document.getElementById('game-list');

      // List all folders in /games automatically
      // This assumes all game folders contain index.html
      const games = [
        // You will manually update this array with new games if using static GitHub Pages,
        // OR use a server script to dynamically list folders if you have a backend.
      ];

      // For GitHub Pages, we can fetch a static JSON of games or hardcode folder names
      // Here’s a simple way if you manually update once
      const gameFolders = ['10-minutes-till-dawn']; // start with existing games

      gameFolders.forEach(game => {
        const div = document.createElement('div');
        div.className = 'game-card';
        div.dataset.name = game.toLowerCase();
        div.innerHTML = `
          <h3>${game.replace(/-/g,' ')}</h3>
          <button onclick="window.open('games/${game}/index.html', '_blank')">Play Game</button>
        `;
        container.appendChild(div);
      });
    }

    function filterGames() {
      const input = document.getElementById('search').value.toLowerCase();
      const cards = document.querySelectorAll('.game-card');
      cards.forEach(card => {
        if(card.dataset.name.includes(input)) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    }

    loadGames();
  </script>
</body>
</html>
