<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moltens Lab - Mase A</title>
<link rel="stylesheet" href="style.css">

<style>
/* Game list styling */
#game-list{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}
.game-card{
  width:150px;
  height:150px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  color:#fff;
  font-weight:bold;
  text-shadow:0 0 5px black;
  cursor:pointer;
  padding:5px;
  box-sizing:border-box;
}
#game-frame{
  width:100%;
  height:600px;
  border:none;
  margin-top:20px;
}
#game-play-wrapper{
  display:flex;
  gap:10px;
  margin-top:20px;
}
.ad-panel{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
#game-container{
  flex:3;
  display:flex;
  flex-direction:column;
}
#game-controls{
  margin-top:5px;
}

/* POPUP OVERLAY */
#cloakPrompt{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.cloakBox{
  background:#111;
  color:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
  width:350px;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}
.cloakButtons{
  margin-top:20px;
  display:flex;
  gap:20px;
  justify-content:center;
}
.cloakButtons button{
  padding:10px 25px;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}
#cloakYes{
  background:#4CAF50;
  color:white;
}
#cloakNo{
  background:#666;
  color:white;
}
</style>
</head>

<body>

<!-- CLOAK POPUP -->
<div id="cloakPrompt">
  <div class="cloakBox">
    <h2>Privacy Mode</h2>
    <p>Do you want to cloak this tab for privacy?</p>
    <div class="cloakButtons">
      <button id="cloakYes">Yes</button>
      <button id="cloakNo">No</button>
    </div>
  </div>
</div>

<header>
<h1>Moltens Lab</h1>
<nav>
<a href="index.html">Home</a>
<a href="games.html">Games</a>
<a href="sites.html" target="_blank">Sites</a>
</nav>
</header>

<main class="games-page">

<input type="text" id="search" placeholder="Search games..." oninput="filterGames()">

<div id="game-list"></div>

<div id="game-play-wrapper">

<div class="ad-panel">
<div class="ad-box">Left Panel</div>
</div>

<div id="game-container">

<iframe id="game-frame"></iframe>

<div id="game-controls">
<button onclick="closeGame()">Close Game</button>

<label>
Volume:
<input type="range" id="volume" min="0" max="100" value="100">
</label>

</div>

</div>

<div class="ad-panel">
<div class="ad-box">Right Panel</div>
</div>

</div>

</main>

<footer>
<p>© 2026 Moltens Lab | Made By: Mason A |
<a href="https://discord.gg/dVxpKG6xz2" target="_blank">Join Discord</a></p>
</footer>

<script>
const gamesContainer = document.getElementById('game-list');
const gameFrame = document.getElementById('game-frame');
const volumeSlider = document.getElementById('volume');
const cloakPrompt = document.getElementById("cloakPrompt");

// --- CLOAK POPUP: Show once per session ---
if (!sessionStorage.getItem("cloakShown")) {
  cloakPrompt.style.display = "flex";

  document.getElementById("cloakYes").onclick = function() {
    const newTab = window.open("about:blank","_blank");
    newTab.document.write(`
      <title>Moltens Lab</title>
      <style>
        html,body{margin:0;height:100%;}
        iframe{border:none;width:100%;height:100%;}
      </style>
      <iframe src="${location.href}"></iframe>
    `);
    // Close current tab
    window.close();
  }

  document.getElementById("cloakNo").onclick = function() {
    cloakPrompt.style.display = "none";
  }

  sessionStorage.setItem("cloakShown","true");
} else {
  cloakPrompt.style.display = "none";
}

// --- LOAD GAMES ---
async function loadGames() {
  try {
    const res = await fetch('games-list.json?v=' + new Date().getTime());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const games = await res.json();

    games.forEach(game => {
      const thumb = game.thumb || 'default-thumbnail.png';
      const div = document.createElement('div');
      div.className = 'game-card';
      div.dataset.name = game.folder.toLowerCase();
      div.style.backgroundImage = `url('${thumb}')`;
      div.innerHTML = `<h3>${game.folder.replace(/-/g,' ')}</h3>`;
      div.addEventListener('click', () => {
        gameFrame.src = `games/${game.folder}/index.html`;
        window.scrollTo({top:gameFrame.offsetTop-20,behavior:'smooth'});
      });
      gamesContainer.appendChild(div);
    });
  } catch(err) {
    console.error("Failed to load games-list.json:", err);
    const errorDiv = document.createElement('div');
    errorDiv.style.color="red";
    errorDiv.textContent="Failed to load games list.";
    gamesContainer.appendChild(errorDiv);
  }
}

loadGames();

// --- SEARCH FUNCTION ---
function filterGames() {
  const input = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.game-card').forEach(card => {
    card.style.display = card.dataset.name.includes(input) ? 'flex' : 'none';
  });
}

// --- CLOSE GAME ---
function closeGame() {
  gameFrame.src = '';
  window.scrollTo({top:0,behavior:'smooth'});
}

// --- VOLUME CONTROL ---
volumeSlider.addEventListener('input', () => {
  const vol = volumeSlider.value / 100;
  try {
    gameFrame.contentWindow.postMessage({type:'setVolume',value:vol},'*');
  } catch(e){}
});
</script>

</body>
</html>
