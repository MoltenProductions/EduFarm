<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moltens Lab - Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Moltens Lab</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="sites.html" target="_blank">Sites</a>
    </nav>
  </header>

  <!-- Main Games Content -->
  <main class="games-page">
    <input type="text" id="search" placeholder="Search games..." oninput="filterGames()">
    <div id="game-list"></div>

    <!-- Game Play Area -->
    <div id="game-play-wrapper">
      <!-- Left Ad Panel -->
      <div class="ad-panel" id="ad-left">
        <div class="ad-box">Left Panel</div>
      </div>

      <!-- Game Container -->
      <div id="game-container">
        <iframe id="game-frame" src=""></iframe>
        <div id="game-controls">
          <button id="close-game" onclick="closeGame()">Close Game</button>
          <label>Volume: <input type="range" id="volume" min="0" max="100" value="100"></label>
        </div>
      </div>

      <!-- Right Ad Panel -->
      <div class="ad-panel" id="ad-right">
        <div class="ad-box">Right Panel</div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>© 2026 Moltens Lab | Made By: Mason A | 
      <a href="https://discord.gg/dVxpKG6xz2" target="_blank">Discord</a>
    </p>
  </footer>

  <!-- Popup Cloak Script -->
  <script>
    // Show cloak popup unless already cloaked
    if(!sessionStorage.getItem('cloaked')) {
      const cloak = confirm("Welcome to Moltens Lab.\n\nIf you are using a public computer you may want to cloak the tab.\nCloaking opens the site inside an about:blank tab so the URL appears blank.\nIf you don't need this you can continue normally.");
      if(cloak) {
        sessionStorage.setItem('cloaked', 'true');
        const win = window.open('about:blank', '_blank');
        win.document.write('<iframe src="' + window.location.href + '" style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;"></iframe>');
        window.close();
      }
    }
  </script>

  <!-- Games Script -->
  <script>
    const gamesContainer = document.getElementById('game-list');
    const gameFrame = document.getElementById('game-frame');
    const volumeSlider = document.getElementById('volume');

    // Load games from JSON
    fetch('games/games-list.json')
      .then(res => res.json())
      .then(folders => {
        folders.forEach(folder => {
          const div = document.createElement('div');
          div.className = 'game-card';
          div.dataset.name = folder.toLowerCase();

          // Set thumbnail: try jpg then png
          const thumbJPG = `games/${folder}/thumbnail.jpg`;
          const thumbPNG = `games/${folder}/thumbnail.png`;
          div.style.backgroundImage = `url('${thumbJPG}')`;
          const imgTest = new Image();
          imgTest.onerror = () => { div.style.backgroundImage = `url('${thumbPNG}')`; };
          imgTest.src = thumbJPG;

          div.innerHTML = `<h3>${folder.replace(/-/g,' ')}</h3>`;
          div.addEventListener('click', () => {
            gameFrame.src = `games/${folder}/index.html`;
            window.scrollTo({top: gameFrame.offsetTop - 20, behavior: 'smooth'});
          });
          gamesContainer.appendChild(div);
        });
      });

    // Search function
    function filterGames() {
      const input = document.getElementById('search').value.toLowerCase();
      const cards = document.querySelectorAll('.game-card');
      cards.forEach(card => {
        card.style.display = card.dataset.name.includes(input) ? 'flex' : 'none';
      });
    }

    // Close game
    function closeGame() {
      gameFrame.src = '';
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // Volume control
    volumeSlider.addEventListener('input', () => {
      const vol = volumeSlider.value / 100;
      try {
        gameFrame.contentWindow.postMessage({type: 'setVolume', value: vol}, '*');
      } catch(e) {
        console.log("Volume control may not work due to cross-origin restrictions");
      }
    });
  </script>
</body>
</html>
