<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moltens Lab - Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Moltens Lab</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
    </nav>
  </header>

  <!-- Main Games Content -->
  <main class="games-page">
    <input type="text" id="search" placeholder="Search games..." oninput="filterGames()">
    <div id="game-list"></div>

    <!-- iframe to load selected game -->
    <iframe id="game-frame" src=""></iframe>
  </main>

  <footer>
    <p>© 2026 Moltens Lab</p>
  </footer>

  <script>
    const gamesContainer = document.getElementById('game-list');
    const gameFrame = document.getElementById('game-frame');

    // Automatic list of games (folder names in /games)
    const gameFolders = ['10-minutes-till-dawn']; // Add new game folders here

    // Generate game cards
    gameFolders.forEach(game => {
      const div = document.createElement('div');
      div.className = 'game-card';
      div.dataset.name = game.toLowerCase();
      div.innerHTML = `<h3>${game.replace(/-/g,' ')}</h3>`;
      div.addEventListener('click', () => {
        gameFrame.src = `games/${game}/index.html`; // opens in same page iframe
      });
      gamesContainer.appendChild(div);
    });

    // Search function
    function filterGames() {
      const input = document.getElementById('search').value.toLowerCase();
      const cards = document.querySelectorAll('.game-card');
      cards.forEach(card => {
        if(card.dataset.name.includes(input)) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
